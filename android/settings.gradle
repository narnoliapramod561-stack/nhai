import com.facebook.react.ReactSettingsExtension

pluginManagement { includeBuild("../node_modules/@react-native/gradle-plugin") }
plugins { id("com.facebook.react.settings") }
extensions.configure(ReactSettingsExtension) { reactSettings ->
    reactSettings.autolinkLibrariesFromCommand(["/opt/homebrew/bin/npx", "@react-native-community/cli", "config"])
}
rootProject.name = 'NhaiApp'
include ':app'
includeBuild('../node_modules/@react-native/gradle-plugin')
